<app-header></app-header>

<!-- IMPORTANTE, ESTO ES DEL VIDEO, PERO EL REGISTRO YA ESTÁ CREADO. CONSIDERAR EL REGISTRO CREADO , HACER UN NUEVO CRUD Y DAR OPCIONES AL PSICOLOGO DE REGISTRAR REPORTES U OBSERVACIONES DEL CLIENTE -->

<div class="container">
        <div class="row">
            <div class="col-12">
                <h1 class="textoRegistro">Registrate:</h1>
            </div>
        </div>
        <div class="row">
            <div class="col-12 col-md-6 col-lg-6">
                <div class="datosRegistro">
                    
                    <div class="campos">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" class="campo" placeholder="nombre" [(ngModel)]="nombre" >
                    </div>

                    <div class="campos">
                        <label for="email">Correo</label>
                        <input type="email" id="email" class="campo" placeholder="ejemplo@ejemplo.com" min="0" [(ngModel)]="email" >
                    </div>

                    <div class="campos">
                        <label for="contraseña">Contraseña</label>
                        <input type="password" id="contraseña" class="campo" placeholder="Contraseña" [(ngModel)]="password" >
                    </div>

                </div>
                
            </div>
            <div class="col-12 col-md-6 col-lg-6">
                <div class="imagenLog">
                <img class="imagenRegistro" src="./assets/imgLogin.png" alt="Imagen Login">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <button class="boton" (click)="registrar()">Registrar</button>

            </div>

        </div>

    </div>

<app-footer></app-footer>
