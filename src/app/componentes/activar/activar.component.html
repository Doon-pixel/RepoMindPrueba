<app-header></app-header>
<div class="titulo">
        Activación de cuenta
    </div>


<div id="activar">
  <div class="form-group">
    <label for="email">Correo</label>
    <input type="email" class="form-control" id="email" [(ngModel)]="email" [disabled]="true">
  </div>
  <div class="form-group">
    <label for="codigo">Codigo de activación</label>
    <input type="text" class="form-control" id="password" [(ngModel)]="codigo" >
  </div>
  <button type="submit" class="btn btn-primary" (click)="Activar()">Activar cuenta</button>
</div>


<app-footer></app-footer>
