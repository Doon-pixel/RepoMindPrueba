*----* debe tener una zona privada para el usuario ejemplo donde cambiar contraseña, o agregar direcciones de envió, o datos de contacto etc

*----* la aplicación y manipulación de  datos se debe hacer totalmente desde el FrontEnd, no pueden agregar datos con compass o por medio de la consola

*----* la aplicación debe correr en su equipo y deben tener el contenido suficiente para hablar del tema como carruseles, imágenes, textos, links a redes,
