<app-header></app-header>

<div class="container">
        <div class="row">
            <div class="col-12">
                <h1 class="textoLogin">Ingresa:</h1>
            </div>
        </div>
        <div class="row">
            <div class="col-12 col-md-6 col-lg-6">
                <div class="datosLogin">
                    <div class="campos">
                        <label for="email">Correo</label>
                        <input type="email" id="email" class="campo" placeholder="ejemplo@ejemplo.com" min="0" [(ngModel)]="email" >
                    </div>
                    <div class="campos">
                        <label for="contraseña">Contraseña</label>
                        <input type="password" id="contraseña" class="campo" placeholder="Contraseña" [(ngModel)]="password" >
                    </div>
                </div>
                
            </div>
            <div class="col-12 col-md-6 col-lg-6">
                <div class="imagenLog">
                <img class="imagenLogin" src="./assets/imgLogin.png" alt="Imagen Login">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <button class="boton" (click)="login()">Ingresar</button>

            </div>

        </div>

</div>

<app-footer></app-footer>
