<app-menulateral></app-menulateral>
<div id="ventanaFlotante">
    <div class="areaTrabajo">
        <div class="titulo">Cambiar Password</div>

        <div id="password">

            <div class="form-group">
            <label for="password">Password</label>
            <input type="password" class="form-control" id="password" [(ngModel)]="password" >
            </div>

            <div class="form-group">
            <label for="confirmar">Confirmar Password</label>
            <input type="password" class="form-control" id="confirmar" [(ngModel)]="confirmarPassword">
            </div>

            <button type="button" class="btn btn-primary" (click)="cambiarPassword()">Cambiar password</button>
        </div>
  </div>
</div>
